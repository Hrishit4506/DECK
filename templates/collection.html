{% extends "base.html" %} {% block content %}

<h1>My Card Collection</h1>

<form method="POST">
  <div class="input-group">
    <input
      type="text"
      name="player_tag"
      placeholder="#PLAYER_TAG"
      required
    />
    <button type="submit">Fetch Collection</button>
  </div>
</form>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

{% if cards %}
<div class="card-grid">
  {% for card in cards %}
  <div class="card rarity-{{ card.rarity }}">
    <img src="{{ card.iconUrls.medium }}" alt="{{ card.name }}" />
    <h3>{{ card.name }}</h3>
    <p>Level: {{ 16 - card.maxLevel + card.level }}</p>
    <p class="rarity-text">{{ card.rarity|title }}</p>
  </div>
  {% endfor %}
</div>
{% endif %}

{% endblock %}
